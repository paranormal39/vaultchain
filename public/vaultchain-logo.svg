<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield outline -->
  <path d="M50 5 L20 20 L20 50 Q20 75 50 95 Q80 75 80 50 L80 20 Z" 
        fill="none" 
        stroke="url(#logoGradient)" 
        stroke-width="2"/>
  
  <!-- Tree trunk -->
  <rect x="47" y="65" width="6" height="15" fill="url(#logoGradient)"/>
  
  <!-- Tree branches and leaves -->
  <path d="M50 65 L45 55 L40 50 L35 45 M50 65 L55 55 L60 50 L65 45" 
        stroke="url(#logoGradient)" 
        stroke-width="2" 
        fill="none"/>
  
  <!-- Leaves -->
  <ellipse cx="35" cy="42" rx="4" ry="6" fill="url(#logoGradient)"/>
  <ellipse cx="42" cy="47" rx="3" ry="5" fill="url(#logoGradient)"/>
  <ellipse cx="50" cy="40" rx="4" ry="6" fill="url(#logoGradient)"/>
  <ellipse cx="58" cy="47" rx="3" ry="5" fill="url(#logoGradient)"/>
  <ellipse cx="65" cy="42" rx="4" ry="6" fill="url(#logoGradient)"/>
  
  <!-- Fruits/berries -->
  <circle cx="38" cy="48" r="2" fill="url(#logoGradient)"/>
  <circle cx="45" cy="52" r="2" fill="url(#logoGradient)"/>
  <circle cx="50" cy="45" r="2" fill="url(#logoGradient)"/>
  <circle cx="55" cy="52" r="2" fill="url(#logoGradient)"/>
  <circle cx="62" cy="48" r="2" fill="url(#logoGradient)"/>
</svg>
